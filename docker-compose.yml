services:
  crm-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    env_file:
      - backend/.env
    restart: always
    networks:
      - crm_internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - crm_internal

networks:
  crm_internal:
    driver: bridge
