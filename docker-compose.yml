version: '3.8'

services:
  crm-frontend:
    image: crm-frontend:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.crm-frontend.rule=Host(`painel.inoovaweb.com.br`)"
        - "traefik.http.routers.crm-frontend.entrypoints=websecure"
        - "traefik.http.routers.crm-frontend.tls=true"
        - "traefik.http.routers.crm-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.crm-frontend.loadbalancer.server.port=80"
        - "traefik.docker.network=inoovawebpro"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
    networks:
      - inoovawebpro

  crm-backend:
    image: crm-backend:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.crm-backend.rule=Host(`api-crminoovaweb.inoovaweb.com.br`)"
        - "traefik.http.routers.crm-backend.entrypoints=websecure"
        - "traefik.http.routers.crm-backend.tls=true"
        - "traefik.http.routers.crm-backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.crm-backend.loadbalancer.server.port=3001"
        - "traefik.docker.network=inoovawebpro"
    environment:
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - inoovawebpro
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks:
      - inoovawebpro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  inoovawebpro:
    external: true
    name: inoovawebpro
