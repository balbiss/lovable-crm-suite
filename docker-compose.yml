version: '3.8'

networks:
  inoovawebpro:
    external: true

services:
  # ===========================================
  # CRM Backend
  # ===========================================
  crm-backend:
    image: crm-backend:latest
    build:
      context: ./backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.crm-backend.rule=Host(`api-crminoovaweb.inoovaweb.com.br`)"
        - "traefik.http.routers.crm-backend.entrypoints=websecure"
        - "traefik.http.routers.crm-backend.tls.certresolver=myresolver"
        - "traefik.http.services.crm-backend.loadbalancer.server.port=3001"
    environment:
      - PORT=3001
