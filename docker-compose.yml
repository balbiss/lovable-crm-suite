services:
  crm-backend:
    image: crm-backend:latest
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    env_file:
      - backend/.env
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - crm_network

  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - crm_network

networks:
  crm_network:
    driver: overlay
    attachable: true
