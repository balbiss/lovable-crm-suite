services:
  crm-backend:
    image: crm-backend:latest
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    env_file:
      - backend/.env
    restart: always
    networks:
      - crm_internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - crm_internal

networks:
  crm_internal:
    driver: bridge
